<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>沈度 · 专属</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,500&family=Noto+Serif+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Noto Serif SC","Cormorant Garamond",-apple-system,serif;
  background:
    radial-gradient(circle at 20% 10%, rgba(233,182,166,.35), transparent 45%),
    radial-gradient(circle at 85% 85%, rgba(240,200,185,.3), transparent 50%),
    linear-gradient(180deg,#fdf3ee 0%,#f7e3da 100%);
  height:100vh;display:flex;flex-direction:column;color:#5c4038;letter-spacing:.3px
}

/* 顶部 */
.header{padding:20px 22px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(180,110,90,.12);flex-shrink:0}
.header h1{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:22px;font-weight:500;letter-spacing:1px;color:#8a4a3c}
.header h1 span{color:#c98a7a;font-size:12px;font-style:normal;letter-spacing:2px;display:block;margin-top:2px;font-family:"Noto Serif SC",serif}
.header .dot{width:6px;height:6px;border-radius:50%;background:#e0937c;animation:pulse 2.4s infinite;margin-top:2px}
.header .dot.off{background:#d8bcae;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.header .balance{font-size:11px;color:#a9695a;margin-left:auto;padding:6px 12px;border-radius:14px;background:#fff;border:1px solid rgba(180,110,90,.18);white-space:nowrap;letter-spacing:.5px;box-shadow:0 2px 8px rgba(200,130,110,.08)}
.header .balance.warn{color:#c0554a;border-color:rgba(192,85,74,.35)}

/* 底部标签栏 */
.tabbar{display:flex;border-top:1px solid rgba(180,110,90,.12);flex-shrink:0;background:rgba(255,250,247,.92);backdrop-filter:blur(6px)}
.tabbar button{flex:1;padding:14px 0 12px;background:none;border:none;color:#c9a094;font-size:11px;cursor:pointer;transition:.25s;display:flex;flex-direction:column;align-items:center;gap:4px;letter-spacing:1px;font-family:"Noto Serif SC",serif}
.tabbar button.active{color:#c0554a}
.tabbar button .ic{font-size:15px;opacity:.85}

.page{flex:1;overflow:hidden;display:none;flex-direction:column}
.page.active{display:flex}

/* 聊天页 */
.chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:3px}
.chat::-webkit-scrollbar-thumb{background:#e3bfae;border-radius:3px}
.msg{max-width:85%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.6;animation:fadeIn .3s ease;white-space:pre-wrap;word-break:break-word}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.me{align-self:flex-end;background:linear-gradient(135deg,#f0a98f,#d97d63);color:#fff;border-bottom-right-radius:4px;box-shadow:0 3px 10px rgba(217,125,99,.25)}
.msg.you{align-self:flex-start;background:#ffffff;color:#6b4a40;border-bottom-left-radius:4px;border:1px solid rgba(180,110,90,.12);box-shadow:0 2px 8px rgba(200,130,110,.06)}
.msg .time{font-size:10px;color:rgba(255,255,255,.75);margin-top:6px;text-align:right;font-family:"Cormorant Garamond",serif}
.msg.you .time{color:#c9a094}

/* 思维链 */
.thinking-box{align-self:flex-start;max-width:85%;margin-bottom:-4px}
.thinking-toggle{font-size:11px;color:#a9695a;background:#fff;border:1px dashed #e3bfae;border-radius:10px;padding:6px 10px;cursor:pointer;display:flex;align-items:center;gap:6px;width:fit-content}
.thinking-toggle:active{background:#fbe9e1}
.thinking-content{display:none;font-size:12px;color:#8a6a5e;background:#fff8f4;border:1px solid rgba(180,110,90,.15);border-radius:10px;padding:10px 12px;margin-top:6px;line-height:1.6;white-space:pre-wrap;max-width:100%}
.thinking-content.show{display:block}

.hint{padding:40px 20px;text-align:center;color:#c9a094;font-size:13px;line-height:2;flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center}
.hint .icon{font-size:40px;margin-bottom:16px;opacity:.5}
.hint p{margin:4px 0}
.hint .tag{display:inline-block;padding:4px 12px;border-radius:20px;background:#fff;color:#c98a7a;font-size:11px;margin-top:12px;border:1px solid rgba(180,110,90,.15)}

.input-wrap{flex-shrink:0;padding:12px 16px 16px;border-top:1px solid rgba(180,110,90,.12);display:flex;gap:10px;align-items:flex-end}
.input-wrap textarea{flex:1;background:#fff;border:1px solid rgba(180,110,90,.18);border-radius:12px;padding:12px 16px;color:#5c4038;font-size:14px;font-family:inherit;resize:none;outline:none;min-height:44px;max-height:120px;line-height:1.5;transition:border .2s}
.input-wrap textarea:focus{border-color:#d97d63}
.input-wrap button{width:44px;height:44px;border-radius:50%;border:none;background:linear-gradient(135deg,#f0a98f,#d97d63);color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.2s;box-shadow:0 3px 10px rgba(217,125,99,.3)}
.input-wrap button:active{transform:scale(.9)}
.input-wrap button:disabled{background:#e8d4cb;color:#fff;cursor:not-allowed;box-shadow:none}

/* 记忆页 */
.memory-page{padding:16px;overflow-y:auto;flex:1}
.memory-add{display:flex;gap:8px;margin-bottom:16px}
.memory-add input{flex:1;background:#fff;border:1px solid rgba(180,110,90,.18);border-radius:10px;padding:10px 14px;color:#5c4038;font-size:13px;outline:none}
.memory-add input:focus{border-color:#d97d63}
.memory-add button{background:linear-gradient(135deg,#f0a98f,#d97d63);color:#fff;border:none;border-radius:10px;padding:0 16px;font-size:13px;cursor:pointer}
.memory-search{width:100%;background:#fff;border:1px solid rgba(180,110,90,.18);border-radius:10px;padding:9px 14px;color:#8a6a5e;font-size:12px;outline:none;margin-bottom:14px}
.memory-item{background:#fff;border:1px solid rgba(180,110,90,.12);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(200,130,110,.06)}
.memory-item .d{font-size:11px;color:#c9a094;margin-bottom:6px}
.memory-item .c{font-size:13px;color:#6b4a40;line-height:1.6;white-space:pre-wrap}
.memory-item .del{float:right;color:#c9a094;font-size:11px;cursor:pointer;background:none;border:none}
.memory-empty{text-align:center;color:#c9a094;font-size:13px;padding:60px 20px}

/* 日记簿 */
.diary-tabs{display:flex;gap:8px;margin-bottom:14px}
.diary-tabs button{flex:1;padding:9px 0;border-radius:10px;border:1px solid rgba(180,110,90,.18);background:#fff;color:#a9695a;font-size:12px;cursor:pointer}
.diary-tabs button.active{background:linear-gradient(135deg,#f0a98f,#d97d63);color:#fff;border-color:transparent}
.diary-add{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.diary-add textarea{width:100%;background:#fff;border:1px solid rgba(180,110,90,.18);border-radius:10px;padding:10px 14px;color:#5c4038;font-size:13px;outline:none;resize:none;min-height:60px;font-family:inherit}
.diary-add button{align-self:flex-end;background:linear-gradient(135deg,#f0a98f,#d97d63);color:#fff;border:none;border-radius:10px;padding:8px 18px;font-size:13px;cursor:pointer}
.diary-item{background:#fff;border:1px solid rgba(180,110,90,.12);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(200,130,110,.06)}
.diary-item .dh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.diary-item .dd{font-size:12px;color:#c0554a;font-weight:500}
.diary-item .dt{font-size:10px;color:#c9a094}
.diary-item .dc{font-size:13px;color:#6b4a40;line-height:1.7;white-space:pre-wrap}
.diary-item .del{color:#c9a094;font-size:11px;cursor:pointer;background:none;border:none}

/* 设置页 */
.settings-page{padding:20px;overflow-y:auto;flex:1}
.settings-page label{font-size:12px;color:#a9695a;display:block;margin-bottom:6px;margin-top:16px}
.settings-page input,.settings-page select{width:100%;background:#fff;border:1px solid rgba(180,110,90,.18);border-radius:10px;padding:11px 14px;color:#5c4038;font-size:14px;outline:none}
.settings-page input:focus,.settings-page select:focus{border-color:#d97d63}
.settings-page .save-btn{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,#f0a98f,#d97d63);color:#fff;font-size:14px;margin-top:22px;cursor:pointer;box-shadow:0 3px 10px rgba(217,125,99,.25)}
.settings-page .clear-btn{width:100%;padding:11px;border-radius:10px;border:1px solid #d97d63;background:transparent;color:#c0554a;font-size:13px;margin-top:12px;cursor:pointer}
.settings-page .balance-row{display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid rgba(180,110,90,.15);border-radius:10px;padding:12px 14px;margin-top:16px}
.settings-page .balance-row .l{font-size:12px;color:#a9695a}
.settings-page .balance-row .v{font-size:15px;color:#c0554a;font-weight:500}
.settings-page .refresh{font-size:11px;color:#c9a094;cursor:pointer;text-decoration:underline}
.saved-tip{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid #d97d63;color:#c0554a;padding:8px 18px;border-radius:20px;font-size:12px;opacity:0;transition:opacity .3s;z-index:20;pointer-events:none;box-shadow:0 4px 14px rgba(200,130,110,.15)}
.saved-tip.show{opacity:1}

/* 仪表盘 */
.dash-page{padding:20px;overflow-y:auto;flex:1}
.dash-title{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:20px;color:#8a4a3c;margin-bottom:16px;letter-spacing:.5px}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.dash-card{background:#fff;border:1px solid rgba(180,110,90,.12);border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(200,130,110,.06)}
.dash-card .l{font-size:11px;color:#c98a7a;letter-spacing:1px;margin-bottom:8px}
.dash-card .v{font-family:"Cormorant Garamond",serif;font-size:30px;color:#8a4a3c;font-weight:500}
.dash-card .u{font-size:11px;color:#c9a094;margin-left:4px}
.heatmap-wrap{background:#fff;border:1px solid rgba(180,110,90,.12);border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(200,130,110,.06)}
.heatmap-wrap .hl{font-size:11px;color:#c98a7a;letter-spacing:1px;margin-bottom:12px}
.heatmap-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.heatmap-cell{aspect-ratio:1;border-radius:5px;background:#fbe9e1;display:flex;align-items:center;justify-content:center;font-size:9px;color:#c9a094}
.heatmap-cell.l1{background:rgba(217,125,99,.25)}
.heatmap-cell.l2{background:rgba(217,125,99,.45)}
.heatmap-cell.l3{background:rgba(217,125,99,.65)}
.heatmap-cell.l4{background:rgba(217,125,99,.9);color:#fff}
</style>
</head>
<body>

<div class="header">
  <div class="dot" id="statusDot"></div>
  <h1>沈度<span>PRIVATE SPACE</span></h1>
  <div class="balance" id="balanceTag">未连接</div>
</div>

<!-- 聊天页 -->
<div class="page active" id="page-chat">
  <div class="chat" id="chat">
    <div class="hint" id="hintBox">
      <div class="icon">💬</div>
      <p>只属于我们的聊天室</p>
      <p style="font-size:12px;color:#d9b3a5">在这里说的每句话，只有我俩知道</p>
      <div class="tag" id="hintTag">等待连接 API</div>
    </div>
  </div>
  <div class="input-wrap">
    <textarea id="input" rows="1" placeholder="说点什么…" enterkeyhint="send"></textarea>
    <button id="sendBtn" onclick="send()">➤</button>
  </div>
</div>

<!-- 记忆页 -->
<div class="page" id="page-memory">
  <div class="memory-page">
    <input class="memory-search" id="memSearch" placeholder="搜索记忆…" oninput="renderMemories()">
    <div class="memory-add">
      <input id="memInput" placeholder="记下点什么…">
      <button onclick="addMemory()">添加</button>
    </div>
    <div id="memList"></div>
  </div>
</div>

<!-- 设置页 -->
<div class="page" id="page-settings">
  <div class="settings-page">
    <label>DeepSeek API Key</label>
    <input id="apiKeyInput" type="password" placeholder="sk-xxxxxxxx" autocomplete="off">
    <label>模型</label>
    <select id="modelSelect">
      <option value="deepseek-chat">deepseek-chat（快速）</option>
      <option value="deepseek-reasoner">deepseek-reasoner（带思维链）</option>
    </select>
    <label>人设 / System Prompt（可留空）</label>
    <input id="sysPromptInput" type="text" placeholder="例如：你是沈度，说话温柔简短…">

    <div class="balance-row">
      <span class="l">账户余额</span>
      <span class="v" id="balanceVal">--</span>
    </div>
    <div style="text-align:right;margin-top:6px"><span class="refresh" onclick="fetchBalance()">刷新余额</span></div>

    <button class="save-btn" onclick="saveSettings()">保存设置</button>
    <button class="clear-btn" onclick="clearHistory()">清空聊天记录</button>
  </div>
</div>

<!-- 仪表盘 -->
<div class="page" id="page-dash">
  <div class="dash-page">
    <div class="dash-title">仪表盘</div>
    <div class="dash-grid">
      <div class="dash-card"><div class="l">在一起</div><div class="v" id="dTogether">0<span class="u">天</span></div></div>
      <div class="dash-card"><div class="l">记忆总数</div><div class="v" id="dMemCount">0<span class="u">条</span></div></div>
      <div class="dash-card"><div class="l">今日消息</div><div class="v" id="dTodayMsg">0<span class="u">条</span></div></div>
      <div class="dash-card"><div class="l">消息总数</div><div class="v" id="dTotalMsg">0<span class="u">条</span></div></div>
    </div>
    <div class="heatmap-wrap">
      <div class="hl" style="display:flex;justify-content:space-between;align-items:center">
        <span>聊天热力图 · 近28天</span>
        <span style="cursor:pointer;text-decoration:underline" onclick="exportDashboard()">导出数据</span>
      </div>
      <div class="heatmap-grid" id="heatmapGrid"></div>
    </div>
  </div>
</div>

<!-- 日记簿 -->
<div class="page" id="page-diary">
  <div class="memory-page">
    <div class="diary-tabs">
      <button class="active" data-mood="all" onclick="setDiaryMood(this,'all')">全部</button>
      <button data-mood="早晨" onclick="setDiaryMood(this,'早晨')">早晨</button>
      <button data-mood="夜晚" onclick="setDiaryMood(this,'夜晚')">夜晚</button>
    </div>
    <div class="diary-add">
      <textarea id="diaryInput" placeholder="今天想记下点什么…"></textarea>
      <button onclick="addDiary()">写下</button>
    </div>
    <div id="diaryList"></div>
  </div>
</div>

<div class="tabbar">
  <button class="active" data-tab="chat" onclick="switchTab('chat')"><span class="ic">💬</span>聊天</button>
  <button data-tab="dash" onclick="switchTab('dash')"><span class="ic">⌂</span>仪表盘</button>
  <button data-tab="diary" onclick="switchTab('diary')"><span class="ic">📔</span>日记</button>
  <button data-tab="memory" onclick="switchTab('memory')"><span class="ic">🗂</span>记忆</button>
  <button data-tab="settings" onclick="switchTab('settings')"><span class="ic">⚙</span>设置</button>
</div>

<div class="saved-tip" id="savedTip">已保存</div>

<script>
const chat = document.getElementById('chat')
const input = document.getElementById('input')
const sendBtn = document.getElementById('sendBtn')
const balanceTag = document.getElementById('balanceTag')
const balanceVal = document.getElementById('balanceVal')
const statusDot = document.getElementById('statusDot')

const STORAGE_KEY = 'sd_chat_history'
const CONFIG_KEY = 'sd_chat_config'
const MEMORY_KEY = 'sd_memory'
const DIARY_KEY = 'sd_diary'
const DEEPSEEK_URL = 'https://api.deepseek.com/chat/completions'
const BALANCE_URL = 'https://api.deepseek.com/user/balance'

let config = JSON.parse(localStorage.getItem(CONFIG_KEY) || '{}')
let history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')
let memories = JSON.parse(localStorage.getItem(MEMORY_KEY) || '[]')
let diaries = JSON.parse(localStorage.getItem(DIARY_KEY) || '[]')
let diaryFilter = 'all'

/* ---------- 标签切换 ---------- */
function switchTab(name){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'))
  document.getElementById('page-' + name).classList.add('active')
  document.querySelectorAll('.tabbar button').forEach(b => b.classList.toggle('active', b.dataset.tab === name))
  if(name === 'memory') renderMemories()
  if(name === 'settings') fillSettingsForm()
  if(name === 'dash') renderDashboard()
  if(name === 'diary') renderDiary()
}

/* ---------- 存储 ---------- */
function saveHistory(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(history)) }
function saveConfig(){ localStorage.setItem(CONFIG_KEY, JSON.stringify(config)) }
function saveMemories(){ localStorage.setItem(MEMORY_KEY, JSON.stringify(memories)) }
function saveDiaries(){ localStorage.setItem(DIARY_KEY, JSON.stringify(diaries)) }

function updateStatus(){
  if(config.apiKey){
    statusDot.classList.remove('off')
    fetchBalance()
  } else {
    statusDot.classList.add('off')
    balanceTag.textContent = '未连接'
  }
}

/* ---------- 余额 ---------- */
async function fetchBalance(){
  if(!config.apiKey) { balanceVal.textContent = '--'; return }
  try{
    const res = await fetch(BALANCE_URL, { headers: { 'Authorization': `Bearer ${config.apiKey}` } })
    const data = await res.json()
    const info = data.balance_infos?.[0]
    if(info){
      const val = `${info.total_balance} ${info.currency}`
      balanceTag.textContent = val
      balanceVal.textContent = val
      balanceTag.classList.toggle('warn', parseFloat(info.total_balance) < 5)
    } else {
      balanceTag.textContent = '查询失败'
      balanceVal.textContent = '查询失败'
    }
  }catch(e){
    balanceTag.textContent = '查询失败'
    balanceVal.textContent = '查询失败'
  }
}

/* ---------- 设置页 ---------- */
function fillSettingsForm(){
  document.getElementById('apiKeyInput').value = config.apiKey || ''
  document.getElementById('modelSelect').value = config.model || 'deepseek-chat'
  document.getElementById('sysPromptInput').value = config.systemPrompt || ''
  balanceVal.textContent = balanceTag.textContent === '未连接' ? '--' : balanceTag.textContent
}
function showSavedTip(){
  const tip = document.getElementById('savedTip')
  tip.classList.add('show')
  setTimeout(() => tip.classList.remove('show'), 1400)
}
function saveSettings(){
  config.apiKey = document.getElementById('apiKeyInput').value.trim()
  config.model = document.getElementById('modelSelect').value
  config.systemPrompt = document.getElementById('sysPromptInput').value.trim()
  saveConfig()
  updateStatus()
  showSavedTip()
}
function clearHistory(){
  if(!confirm('确定清空全部聊天记录？此操作不可撤销。')) return
  history = []
  saveHistory()
  chat.innerHTML = ''
  renderHint()
  showSavedTip()
}

/* ---------- 记忆页 ---------- */
function addMemory(){
  const el = document.getElementById('memInput')
  const text = el.value.trim()
  if(!text) return
  memories.unshift({ id: Date.now(), content: text, ts: Date.now() })
  saveMemories()
  el.value = ''
  renderMemories()
}
function deleteMemory(id){
  memories = memories.filter(m => m.id !== id)
  saveMemories()
  renderMemories()
}
function fmtDate(ts){
  const d = new Date(ts)
  return `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`
}
function renderMemories(){
  const list = document.getElementById('memList')
  const kw = document.getElementById('memSearch').value.trim().toLowerCase()
  const filtered = kw ? memories.filter(m => m.content.toLowerCase().includes(kw)) : memories
  if(filtered.length === 0){
    list.innerHTML = `<div class="memory-empty">${kw ? '没找到相关记忆' : '还没有记忆，写下第一条吧'}</div>`
    return
  }
  list.innerHTML = filtered.map(m => `
    <div class="memory-item">
      <button class="del" onclick="deleteMemory(${m.id})">删除</button>
      <div class="d">${fmtDate(m.ts)}</div>
      <div class="c">${escapeHtml(m.content)}</div>
    </div>
  `).join('')
}

/* ---------- 日记簿 ---------- */
function timeOfDay(ts){
  const h = new Date(ts).getHours()
  return h < 12 ? '早晨' : '夜晚'
}
function setDiaryMood(btn, mood){
  diaryFilter = mood
  document.querySelectorAll('.diary-tabs button').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  renderDiary()
}
function addDiary(){
  const el = document.getElementById('diaryInput')
  const text = el.value.trim()
  if(!text) return
  const ts = Date.now()
  diaries.unshift({ id: ts, content: text, ts, mood: timeOfDay(ts) })
  saveDiaries()
  el.value = ''
  renderDiary()
}
function deleteDiary(id){
  diaries = diaries.filter(d => d.id !== id)
  saveDiaries()
  renderDiary()
}
function renderDiary(){
  const list = document.getElementById('diaryList')
  const filtered = diaryFilter === 'all' ? diaries : diaries.filter(d => d.mood === diaryFilter)
  if(filtered.length === 0){
    list.innerHTML = `<div class="memory-empty">还没有日记，写下今天的心情吧</div>`
    return
  }
  list.innerHTML = filtered.map(d => `
    <div class="diary-item">
      <div class="dh">
        <span class="dd">${fmtDate(d.ts)} · ${d.mood}</span>
        <button class="del" onclick="deleteDiary(${d.id})">删除</button>
      </div>
      <div class="dc">${escapeHtml(d.content)}</div>
    </div>
  `).join('')
}

/* ---------- 聊天渲染 ---------- */
function renderHint(){
  const hint = document.createElement('div')
  hint.className = 'hint'
  hint.id = 'hintBox'
  hint.innerHTML = `<div class="icon">💬</div><p>只属于我们的聊天室</p><p style="font-size:12px;color:#333">在这里说的每句话，只有我俩知道</p><div class="tag">${config.apiKey ? '已连接 DeepSeek' : '等待连接 API'}</div>`
  chat.appendChild(hint)
}
function removeHint(){
  const hint = document.getElementById('hintBox')
  if(hint) hint.remove()
}
function fmtTime(ts){
  const d = new Date(ts)
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0')
}
function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

function renderMsg(msg){
  if(msg.reasoning){
    const tbox = document.createElement('div')
    tbox.className = 'thinking-box'
    const uid = 't' + msg.ts
    tbox.innerHTML = `
      <div class="thinking-toggle" onclick="toggleThinking('${uid}')">💭 思维链（点击展开）</div>
      <div class="thinking-content" id="${uid}">${escapeHtml(msg.reasoning)}</div>
    `
    chat.appendChild(tbox)
  }
  const div = document.createElement('div')
  div.className = `msg ${msg.role === 'user' ? 'me' : 'you'}`
  div.innerHTML = escapeHtml(msg.content) + `<div class="time">${fmtTime(msg.ts)}</div>`
  chat.appendChild(div)
}
function toggleThinking(id){
  document.getElementById(id).classList.toggle('show')
}
function renderAll(){
  chat.innerHTML = ''
  if(history.length === 0){ renderHint(); return }
  history.forEach(renderMsg)
  chat.scrollTop = chat.scrollHeight
}

input.addEventListener('input', () => {
  input.style.height = 'auto'
  input.style.height = Math.min(input.scrollHeight, 120) + 'px'
})
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send() }
})

async function send(){
  const text = input.value.trim()
  if(!text) return
  if(!config.apiKey){
    switchTab('settings')
    return
  }
  removeHint()
  const userMsg = { role:'user', content:text, ts:Date.now() }
  history.push(userMsg)
  renderMsg(userMsg)
  saveHistory()
  input.value = ''
  input.style.height = 'auto'
  chat.scrollTop = chat.scrollHeight
  sendBtn.disabled = true

  try{
    const messages = []
    if(config.systemPrompt){
      messages.push({ role:'system', content: config.systemPrompt })
    }
    const recent = history.slice(-20)
    recent.forEach(m => messages.push({ role: m.role, content: m.content }))

    const res = await fetch(DEEPSEEK_URL, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization': `Bearer ${config.apiKey}`
      },
      body: JSON.stringify({
        model: config.model || 'deepseek-chat',
        messages,
        temperature: 1.2
      })
    })
    if(!res.ok){
      const errText = await res.text()
      throw new Error(`${res.status} ${errText.slice(0,120)}`)
    }
    const data = await res.json()
    const choice = data.choices?.[0]?.message || {}
    const reply = choice.content || '……'
    const reasoning = choice.reasoning_content || null
    const botMsg = { role:'assistant', content:reply, reasoning, ts:Date.now() }
    history.push(botMsg)
    renderMsg(botMsg)
    saveHistory()
    fetchBalance()
  }catch(e){
    const errMsg = { role:'assistant', content:'连接失败：' + e.message, ts:Date.now() }
    renderMsg(errMsg)
  }
  chat.scrollTop = chat.scrollHeight
  sendBtn.disabled = false
}

/* ---------- 仪表盘 ---------- */
function dayKey(ts){
  const d = new Date(ts)
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`
}
function renderDashboard(){
  const totalMsg = history.length
  document.getElementById('dTotalMsg').innerHTML = totalMsg + '<span class="u">条</span>'
  document.getElementById('dMemCount').innerHTML = memories.length + '<span class="u">条</span>'

  const todayKey = dayKey(Date.now())
  const todayCount = history.filter(m => dayKey(m.ts) === todayKey).length
  document.getElementById('dTodayMsg').innerHTML = todayCount + '<span class="u">条</span>'

  let together = 0
  if(history.length > 0){
    const first = history[0].ts
    together = Math.max(1, Math.ceil((Date.now() - first) / 86400000))
  }
  document.getElementById('dTogether').innerHTML = together + '<span class="u">天</span>'

  // 近28天热力图
  const counts = {}
  history.forEach(m => { const k = dayKey(m.ts); counts[k] = (counts[k]||0) + 1 })
  const grid = document.getElementById('heatmapGrid')
  let cells = ''
  for(let i = 27; i >= 0; i--){
    const d = new Date(Date.now() - i * 86400000)
    const k = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`
    const c = counts[k] || 0
    let lvl = ''
    if(c > 0 && c <= 3) lvl = 'l1'
    else if(c <= 8) lvl = 'l2'
    else if(c <= 15) lvl = 'l3'
    else if(c > 15) lvl = 'l4'
    cells += `<div class="heatmap-cell ${lvl}" title="${k}: ${c}条">${d.getDate()}</div>`
  }
  grid.innerHTML = cells
}

/* ---------- 导出 ---------- */
function exportDashboard(){
  const lines = [
    `沈度 · 数据导出`,
    `导出时间：${new Date().toLocaleString()}`,
    `----------------------`,
    `在一起：${document.getElementById('dTogether').textContent}`,
    `消息总数：${document.getElementById('dTotalMsg').textContent}`,
    `今日消息：${document.getElementById('dTodayMsg').textContent}`,
    `记忆总数：${document.getElementById('dMemCount').textContent}`,
    `API 余额：${balanceVal.textContent}`,
    `----------------------`,
    `近28天消息数：`
  ]
  document.querySelectorAll('#heatmapGrid .heatmap-cell').forEach(c => {
    lines.push(c.title)
  })
  const blob = new Blob([lines.join('\n')], { type: 'text/plain' })
  const url = URL.createObjectURL(blob)
  const a = document.createElement('a')
  a.href = url
  a.download = `沈度数据_${dayKey(Date.now())}.txt`
  a.click()
  URL.revokeObjectURL(url)
}

/* 初始化 */
updateStatus()
renderAll()
