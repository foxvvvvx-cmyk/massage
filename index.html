<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>沈度</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#faf5f2">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,500&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 抽屉遮罩 -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<!-- 角色抽屉 -->
<aside class="drawer" id="drawer">
  <div class="drawer-header">
    <h2>角色</h2>
    <button class="btn-icon" onclick="newPersona()" title="新建角色">＋</button>
  </div>
  <div class="persona-list" id="personaList"></div>
  <div class="drawer-footer">
    <small>点击切换角色 · 左滑编辑</small>
  </div>
</aside>

<!-- 主应用 -->
<div class="app" id="app">

  <!-- ===== 聊天页 ===== -->
  <section class="page active" id="page-chat">
    <header class="topbar">
      <button class="btn-avatar" id="topAvatar" onclick="openDrawer()">🌙</button>
      <div class="persona-info" onclick="openDrawer()">
        <span class="persona-name" id="chatName">沈度</span>
        <span class="persona-status" id="chatStatus">
          <span class="status-dot"></span>online
        </span>
      </div>
      <div class="topbar-actions">
        <button class="btn-icon" onclick="switchTab('dash')">⌂</button>
      </div>
    </header>

    <div class="messages" id="messages">
      <div class="hint" id="hintBox">
        <div class="hint-avatar">🌙</div>
        <p class="hint-greeting" id="greetingText">欢迎回来</p>
        <p class="hint-sub">在这儿说的每句话，只有我俩知道</p>
        <span class="hint-tag" id="hintTag">等待连接 API</span>
      </div>
    </div>

    <div class="input-area">
      <button class="btn-icon voice-btn" id="voiceBtn" onclick="toggleVoice()" title="语音输入">🎤</button>
      <div class="input-wrapper">
        <textarea id="input" rows="1" placeholder="说点什么…" enterkeyhint="send"></textarea>
      </div>
      <button class="btn-send" id="sendBtn" onclick="send()" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </button>
    </div>
  </section>

  <!-- ===== 仪表盘 ===== -->
  <section class="page" id="page-dash">
    <header class="topbar">
      <button class="btn-icon" onclick="switchTab('chat')">←</button>
      <span class="topbar-title">仪表盘</span>
      <span style="width:36px"></span>
    </header>
    <div class="page-content" id="dashContent"></div>
  </section>

  <!-- ===== 日记页 ===== -->
  <section class="page" id="page-diary">
    <header class="topbar">
      <button class="btn-icon" onclick="switchTab('chat')">←</button>
      <span class="topbar-title">日记</span>
      <button class="btn-icon" onclick="showDiaryAdd()">＋</button>
    </header>
    <div class="page-content" id="diaryContent"></div>
  </section>

  <!-- ===== 记忆页 ===== -->
  <section class="page" id="page-memory">
    <header class="topbar">
      <button class="btn-icon" onclick="switchTab('chat')">←</button>
      <span class="topbar-title">记忆</span>
      <button class="btn-icon" onclick="showMemoryAdd()">＋</button>
    </header>
    <div class="page-content" id="memoryContent"></div>
  </section>

  <!-- ===== 设置页 ===== -->
  <section class="page" id="page-settings">
    <header class="topbar">
      <button class="btn-icon" onclick="switchTab('chat')">←</button>
      <span class="topbar-title">设置</span>
      <span style="width:36px"></span>
    </header>
    <div class="page-content" id="settingsContent"></div>
  </section>

</div>

<!-- 底部标签栏 -->
<nav class="tabbar" id="tabbar">
  <button class="active" data-tab="chat">
    <span class="tb-icon">💬</span><span class="tb-label">聊天</span>
  </button>
  <button data-tab="dash">
    <span class="tb-icon">⌂</span><span class="tb-label">数据</span>
  </button>
  <button data-tab="diary">
    <span class="tb-icon">📔</span><span class="tb-label">日记</span>
  </button>
  <button data-tab="memory">
    <span class="tb-icon">🗂</span><span class="tb-label">记忆</span>
  </button>
  <button data-tab="settings">
    <span class="tb-icon">⚙</span><span class="tb-label">设置</span>
  </button>
</nav>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 角色编辑弹窗 -->
<div class="modal-overlay" id="personaModalOverlay">
  <div class="modal-sheet" id="personaModal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <button class="btn-text" onclick="closePersonaModal()">取消</button>
      <h3>编辑角色</h3>
      <button class="btn-text primary" onclick="savePersona()">保存</button>
    </div>
    <div class="modal-body" id="personaForm"></div>
  </div>
</div>

<!-- 通用确认弹窗 -->
<div class="modal-overlay" id="confirmModalOverlay">
  <div class="modal-sheet modal-confirm">
    <div class="modal-handle"></div>
    <h3 id="confirmTitle">确认</h3>
    <p id="confirmMsg"></p>
    <div class="btn-row">
      <button class="btn-outline" onclick="closeConfirm()">取消</button>
      <button class="btn-primary" id="confirmOk">确认</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
