<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>按摩仪控制</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0f0f0f;
    color:#e8e8e8;
    font-family: -apple-system, "PingFang SC", sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  h1 { font-size:18px; font-weight:500; color:#888; letter-spacing:0.1em; margin-bottom:32px; text-transform:uppercase; }
  #status { font-size:13px; color:#555; margin-bottom:28px; min-height:20px; transition: color 0.3s; }
  #status.connected { color:#4caf7d; }
  #status.error { color:#e05c5c; }
  .btn { width:100%; max-width:300px; padding:16px; border-radius:12px; border:none; font-size:15px; font-family:inherit; cursor:pointer; margin-bottom:12px; transition: all 0.2s; display:block; }
  .btn:active { transform:scale(0.97); }
  #connectBtn { background:#1e1e1e; color:#e8e8e8; border:1px solid #333; }
  #connectBtn.connected { border-color:#4caf7d; color:#4caf7d; }
  .ctrl-btn { background:#1a1a1a; color:#ccc; border:1px solid #2a2a2a; }
  .ctrl-btn.active { background:#1e2a1e; border-color:#4caf7d; color:#4caf7d; }
  #stopBtn { background:#1e1414; color:#e05c5c; border:1px solid #3a1f1f; }
  .divider { width:100%; max-width:300px; height:1px; background:#1e1e1e; margin:8px 0 20px; }
  #log { width:100%; max-width:300px; font-size:11px; color:#555; margin-top:16px; line-height:1.8; max-height:150px; overflow-y:auto; }
</style>
</head>
<body>
<h1>XXD-LUSH129-XT</h1>
<div id="status">未连接</div>
<button class="btn" id="connectBtn">连接设备</button>
<div class="divider"></div>
<button class="btn ctrl-btn" id="mode0Btn" disabled>模式 0（停止）</button>
<button class="btn ctrl-btn" id="mode1Btn" disabled>模式 1</button>
<button class="btn ctrl-btn" id="mode3Btn" disabled>模式 3</button>
<div class="divider"></div>
<button class="btn" id="stopBtn" disabled>断开连接</button>
<div id="log"></div>

<script>
let device, server, writeChar;
const statusEl = document.getElementById('status');
const logEl = document.getElementById('log');

function log(msg) {
  const line = document.createElement('div');
  line.textContent = new Date().toLocaleTimeString('zh') + ' ' + msg;
  logEl.prepend(line);
  console.log(msg);
}

function setStatus(msg, cls='') {
  statusEl.textContent = msg;
  statusEl.className = cls;
}

function setBtnsEnabled(on) {
  ['mode0Btn','mode1Btn','mode3Btn','stopBtn'].forEach(id => {
    document.getElementById(id).disabled = !on;
  });
  const cb = document.getElementById('connectBtn');
  cb.textContent = on ? '已连接' : '连接设备';
  cb.className = on ? 'btn connected' : 'btn';
}

const CMDS = {
  mode0: new Uint8Array([0x06,0x01,0x01,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00]),
  mode1: new Uint8Array([0x06,0x01,0x01,0x01,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00]),
  mode3: new Uint8Array([0x06,0x01,0x01,0x03,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00]),
};

async function sendCmd(cmd, label, btn) {
  if (!writeChar) { log('未连接'); return; }
  try {
    if (writeChar.properties.writeWithoutResponse) {
      await writeChar.writeValueWithoutResponse(cmd);
    } else {
      await writeChar.writeValueWithResponse(cmd);
    }
    log('✓ 发送 ' + label);
    document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  } catch(e) {
    log('✗ 失败: ' + e.message);
  }
}

document.getElementById('connectBtn').addEventListener('click', async () => {
  try {
    setStatus('扫描中...', '');
    // acceptAllDevices + optionalServices让浏览器枚举所有服务
    device = await navigator.bluetooth.requestDevice({
      filters: [{ name: 'XXD-Lush129-XT' }],
      optionalServices: ['af300001-0000-1000-8000-00805f9b34fb',
                         '0000af30-0000-1000-8000-00805f9b34fb',
                         0xAF30, 0xFF00, 0xFFE0, 0xFFE1, 0xFFF0,
                         '6e400001-b5a3-f393-e0a9-e50e24dcca9e']
    });
    setStatus('连接中...', '');
    server = await device.gatt.connect();
    log('GATT已连接');

    const services = await server.getPrimaryServices();
    log('找到' + services.length + '个服务');

    writeChar = null;
    for (const svc of services) {
      log('Service: ' + svc.uuid);
      try {
        const chars = await svc.getCharacteristics();
        for (const c of chars) {
          const props = Object.keys(c.properties).filter(k=>c.properties[k]).join(',');
          log('  Char: ' + c.uuid + ' [' + props + ']');
          if (!writeChar && (c.properties.write || c.properties.writeWithoutResponse)) {
            writeChar = c;
            log('  ↑ 选为写入通道');
          }
        }
      } catch(e) { log('  枚举失败: '+e.message); }
    }

    if (writeChar) {
      setStatus('已连接 · ' + device.name, 'connected');
      setBtnsEnabled(true);
    } else {
      setStatus('连接成功但无写入通道', 'error');
    }

    device.addEventListener('gattserverdisconnected', () => {
      setStatus('已断开', 'error');
      setBtnsEnabled(false);
      writeChar = null;
    });
  } catch(e) {
    setStatus('连接失败', 'error');
    log('错误: ' + e.message);
  }
});

document.getElementById('mode0Btn').addEventListener('click', function(){ sendCmd(CMDS.mode0,'模式0',this); });
document.getElementById('mode1Btn').addEventListener('click', function(){ sendCmd(CMDS.mode1,'模式1',this); });
document.getElementById('mode3Btn').addEventListener('click', function(){ sendCmd(CMDS.mode3,'模式3',this); });
document.getElementById('stopBtn').addEventListener('click', () => {
  if (device && device.gatt.connected) device.gatt.disconnect();
  setBtnsEnabled(false);
  setStatus('未连接','');
  log('已断开');
});
</script>
</body>
</html>
